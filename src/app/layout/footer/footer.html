<footer class="footer">
  <div class="footer__inner">
    <p class="footer__copyright">&copy; {{ currentYear }} Bhagya Sankar Maddela. All rights reserved.</p>

    <ul class="footer__social" role="list">
      @for (link of socialLinks; track link.icon) {
        <li>
          @if (link.external) {
            <a
              class="footer__social-link"
              [href]="link.href"
              target="_blank"
              rel="noopener noreferrer"
              [attr.aria-label]="link.ariaLabel"
              [attr.title]="link.label"
            >
              <app-social-icon [name]="link.icon" />
            </a>
          } @else {
            <a
              class="footer__social-link"
              [href]="link.href"
              [attr.aria-label]="link.ariaLabel"
              [attr.title]="link.label"
            >
              <app-social-icon [name]="link.icon" />
            </a>
          }
        </li>
      }
    </ul>
  </div>
</footer>
