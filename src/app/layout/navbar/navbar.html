<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__inner">
    <a routerLink="/" class="navbar__brand" (click)="closeMenu()">Bhagya Sankar Maddela</a>

    <button
      type="button"
      class="navbar__toggle"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="primary-navigation"
      [attr.aria-label]="menuOpen() ? 'Close navigation menu' : 'Open navigation menu'"
    >
      @if (menuOpen()) {
        <svg lucideX [size]="22"></svg>
      } @else {
        <svg lucideMenu [size]="22"></svg>
      }
    </button>

    <nav
      id="primary-navigation"
      class="navbar__nav"
      [class.navbar__nav--open]="menuOpen()"
      aria-label="Primary"
    >
      <ul class="navbar__list" role="list">
        @for (link of navLinks; track link.path) {
          <li>
            <a
              [routerLink]="link.path"
              routerLinkActive="navbar__link--active"
              [routerLinkActiveOptions]="{ exact: link.path === '/' }"
              class="navbar__link"
              (click)="closeMenu()"
            >
              {{ link.label }}
            </a>
          </li>
        }
      </ul>
    </nav>
  </div>
</header>
